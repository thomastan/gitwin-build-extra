name: Release Build

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout build-extra
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: build-extra

      - name: Checkout MSYS2-packages (your fork)
        uses: actions/checkout@v4
        with:
          repository: thomastan/MSYS2-packages
          path: MSYS2-packages

      - name: Checkout git (upstream)
        uses: actions/checkout@v4
        with:
          repository: git-for-windows/git
          path: git

      - name: Download Git SDK
        shell: bash
        run: |
          curl -LO https://github.com/git-for-windows/git-sdk-64/releases/latest/download/git-sdk-x86_64-minimal.tar.gz

      - name: Install Git for Windows SDK to C drive
        shell: bash
        run: |
          # Ensure SDK root exists and create usr/src layout
          mkdir -p /c/git-sdk-64
          mkdir -p /c/git-sdk-64/usr/src

          # Extract SDK into C:/git-sdk-64 root
          tar -xzf git-sdk-x86_64-minimal.tar.gz -C /c/git-sdk-64 --strip-components=1

      - name: Move repos into SDK layout
        shell: bash
        run: |
          # Ensure target usr/src exists
          mkdir -p /c/git-sdk-64/usr/src

          # Move build-extra into SDK
          mv "$GITHUB_WORKSPACE/build-extra" /c/git-sdk-64/usr/src/build-extra

          # Flatten nested build-extra directory if present
          if [ -d /c/git-sdk-64/usr/src/build-extra/build-extra ]; then
              mv /c/git-sdk-64/usr/src/build-extra/build-extra/* /c/git-sdk-64/usr/src/build-extra/
              rmdir /c/git-sdk-64/usr/src/build-extra/build-extra
          fi

          # Move MSYS2-packages and git into SDK
          mv "$GITHUB_WORKSPACE/MSYS2-packages" /c/git-sdk-64/usr/src/MSYS2-packages
          mv "$GITHUB_WORKSPACE/git" /c/git-sdk-64/usr/src/git

      - name: Build Git for Windows (full installer)
        shell: bash
        run: |
          cd /c/git-sdk-64/usr/src/build-extra
          ./please.sh release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: git-for-windows-artifacts
          path: /c/git-sdk-64/usr/src/build-extra/out/artifacts/*
