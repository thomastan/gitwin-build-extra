name: Release Build

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: windows-latest
    env:
      # fallback: point 32-bit SDK requests to the 64-bit SDK
      WINDOWS_SDK32_PATH: /c/git-sdk-64

    steps:
      - name: Checkout build-extra
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: build-extra

      - name: Checkout MSYS2-packages (your fork)
        uses: actions/checkout@v4
        with:
          repository: thomastan/MSYS2-packages
          path: MSYS2-packages
          # optional: pin a branch explicitly
          # ref: main

      - name: Checkout git (upstream)
        uses: actions/checkout@v4
        with:
          repository: git-for-windows/git
          path: git

      - name: Download 64-bit Git SDK
        shell: bash
        run: |
          curl -fLO https://github.com/git-for-windows/git-sdk-64/releases/latest/download/git-sdk-x86_64-minimal.tar.gz

      - name: Install 64-bit SDK to C drive
        shell: bash
        run: |
          mkdir -p /c/git-sdk-64
          tar -xzf git-sdk-x86_64-minimal.tar.gz -C /c/git-sdk-64 --strip-components=1
          mkdir -p /c/git-sdk-64/usr/src

      - name: Try to download 32-bit SDK (optional) or fallback
        shell: bash
        id: sdk32
        run: |
          set -e
          mkdir -p /c/git-sdk-32
          FOUND=0
          for url in \
            "https://github.com/git-for-windows/git-sdk-32/releases/latest/download/git-sdk-i686-minimal.tar.gz" \
            "https://github.com/git-for-windows/git-sdk-32/releases/latest/download/git-sdk-x86_minimal.tar.gz"; do
            echo "Trying $url"
            if curl -fLO "$url"; then
              tar -xzf *.tar.gz -C /c/git-sdk-32 --strip-components=1 || true
              echo "windows.sdk32.path=/c/git-sdk-32" > sdk32.env
              FOUND=1
              break
            fi
          done
          if [ "$FOUND" -eq 0 ]; then
            echo "No 32-bit SDK found; falling back to 64-bit SDK"
            echo "windows.sdk32.path=/c/git-sdk-64" > sdk32.env
          fi
          echo "found32=$FOUND" > sdk32.out

      - name: Move repos into SDK layout
        shell: bash
        run: |
          mkdir -p /c/git-sdk-64/usr/src

          # Move or copy build-extra into SDK usr/src
          if mv "$GITHUB_WORKSPACE/build-extra" /c/git-sdk-64/usr/src/build-extra 2>/dev/null; then
            echo "Moved build-extra"
          else
            echo "mv failed; copying build-extra"
            cp -a "$GITHUB_WORKSPACE/build-extra" /c/git-sdk-64/usr/src/
            rm -rf "$GITHUB_WORKSPACE/build-extra"
          fi

          # Flatten nested build-extra if present
          if [ -d /c/git-sdk-64/usr/src/build-extra/build-extra ]; then
            mv /c/git-sdk-64/usr/src/build-extra/build-extra/* /c/git-sdk-64/usr/src/build-extra/ || true
            rmdir /c/git-sdk-64/usr/src/build-extra/build-extra || true
          fi

          # Move or copy MSYS2-packages and git into SDK usr/src
          if mv "$GITHUB_WORKSPACE/MSYS2-packages" /c/git-sdk-64/usr/src/MSYS2-packages 2>/dev/null; then
            echo "Moved MSYS2-packages"
          else
            cp -a "$GITHUB_WORKSPACE/MSYS2-packages" /c/git-sdk-64/usr/src/
            rm -rf "$GITHUB_WORKSPACE/MSYS2-packages"
          fi

          if mv "$GITHUB_WORKSPACE/git" /c/git-sdk-64/usr/src/git 2>/dev/null; then
            echo "Moved git"
          else
            cp -a "$GITHUB_WORKSPACE/git" /c/git-sdk-64/usr/src/
            rm -rf "$GITHUB_WORKSPACE/git"
          fi

      - name: Export windows.sdk32.path for please.sh
        shell: bash
        run: |
          if [ -f sdk32.env ]; then
            # sdk32.env contains a single line like: windows.sdk32.path=/c/git-sdk-64
            . ./sdk32.env
            echo "Exporting windows.sdk32.path=$windows_sdk32_path"
            export windows.sdk32.path="$windows_sdk32_path"
          else
            export windows.sdk32.path=/c/git-sdk-64
            echo "Exporting default windows.sdk32.path=/c/git-sdk-64"
          fi
        env:
          # make the fallback value available inside the step
          windows_sdk32_path: ${{ env.WINDOWS_SDK32_PATH }}

      - name: Probe please.sh and pick command
        id: detect
        shell: bash
        run: |
          cd /c/git-sdk-64/usr/src/build-extra
          ./please.sh > please.help 2>&1 || true
          cat please.help

          # prefer full release, then installer, then git, then makepkg
          if grep -qE '\brelease\b' please.help; then
            echo "cmd=release" >> $GITHUB_OUTPUT
          elif grep -qE '\binstaller\b' please.help; then
            echo "cmd=installer" >> $GITHUB_OUTPUT
          elif grep -qE '\bgit\b' please.help; then
            echo "cmd=git" >> $GITHUB_OUTPUT
          elif grep -qE '\bmakepkg\b' please.help; then
            echo "cmd=makepkg" >> $GITHUB_OUTPUT
          else
            echo "No known please.sh command found" >&2
            exit 2
          fi

      - name: Run please.sh chosen command
        shell: bash
        run: |
          cd /c/git-sdk-64/usr/src/build-extra

          # ensure the 32-bit SDK override is visible to please.sh
          if [ -f sdk32.env ]; then
            . ./sdk32.env
            export windows.sdk32.path="$windows_sdk32_path"
          else
            export windows.sdk32.path=/c/git-sdk-64
          fi

          CMD="${{ steps.detect.outputs.cmd }}"
          echo "Running: ./please.sh $CMD"
          ./please.sh "$CMD"

      - name: Upload artifacts (if any)
        uses: actions/upload-artifact@v4
        with:
          name: git-for-windows-artifacts
          path: /c/git-sdk-64/usr/src/build-extra/out/artifacts/*
