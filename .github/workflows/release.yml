name: Release Build

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout build-extra
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout MSYS2-packages (your fork)
        uses: actions/checkout@v4
        with:
          repository: thomastan/MSYS2-packages
          path: MSYS2-packages

      - name: Checkout git (upstream)
        uses: actions/checkout@v4
        with:
          repository: git-for-windows/git
          path: git

      - name: Install Git for Windows SDK
        shell: bash
        run: |
          curl -LO https://github.com/git-for-windows/git-sdk-64/releases/latest/download/git-sdk-x86_64-minimal.tar.gz
          tar -xf git-sdk-x86_64-minimal.tar.gz -C /usr/src

      - name: Build MSYS2 rootfs
        shell: bash
        run: |
          cd /usr/src/build-extra
          ./build-rootfs.sh

      - name: Build Git
        shell: bash
        run: |
          cd /usr/src/build-extra
          ./build-git.sh

      - name: Build installers
        shell: bash
        run: |
          cd /usr/src/build-extra
          ./build-installers.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: git-for-windows-artifacts
          path: out/artifacts/*

