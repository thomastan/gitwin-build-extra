name: Build GitXdgPatched
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-installer:
    runs-on: windows-latest
    steps:
      - name: Checkout build-extra
        uses: actions/checkout@v4

      - name: Setup Git for Windows SDK
        uses: git-for-windows/setup-git-for-windows-sdk@v1
        with:
          flavor: build-installers

      - name: Build and Inject Patched Bash
        # In this environment, 'shell: bash' IS the MSYS2 Bash from the SDK
        shell: bash
        run: |
          # 1. Clone your specific branch
          git clone --branch main https://github.com/thomastan/msys2-packages.git /usr/src/msys2-packages
          
          cd /usr/src/msys2-packages/bash
          
          # 2. Build the package (using the SDK's makepkg-msys)
          sdk makepkg-msys --noconfirm --nocheck -s
          
          # 3. Install it into the live SDK environment
          pacman -U --noconfirm *.pkg.tar.zst

      - name: Build GitXdgPatched Installer
        shell: bash
        run: |
          cd installer
          
          # Update the AppName for your custom build
          sed -i 's/AppName=Git/AppName=GitXdgPatched/' install.iss
          
          # Run the Inno Setup compiler (already in PATH via SDK)
          iscc install.iss

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GitXdgPatched-Installer
          path: installer/Output/*.exe
