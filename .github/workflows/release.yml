name: Release Build

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: windows-latest
    env:
      FALLBACK_SDK32_PATH: /c/git-sdk-64

    steps:
      - name: Checkout build-extra
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: build-extra

      - name: Checkout MSYS2-packages (your fork)
        uses: actions/checkout@v4
        with:
          repository: thomastan/MSYS2-packages
          path: MSYS2-packages
          # ref: main

      - name: Checkout git (upstream)
        uses: actions/checkout@v4
        with:
          repository: git-for-windows/git
          path: git

      - name: "Download 64-bit Git SDK"
        shell: bash
        run: |
          curl -fLO https://github.com/git-for-windows/git-sdk-64/releases/latest/download/git-sdk-x86_64-minimal.tar.gz

      - name: "Install 64-bit SDK to C:"
        shell: bash
        run: |
          mkdir -p /c/git-sdk-64
          tar -xzf git-sdk-x86_64-minimal.tar.gz -C /c/git-sdk-64 --strip-components=1
          mkdir -p /c/git-sdk-64/usr/src

      - name: "Try 32-bit SDK or write fallback path"
        id: sdk32
        shell: bash
        run: |
          mkdir -p /c/git-sdk-32
          FOUND=0
          for url in \
            "https://github.com/git-for-windows/git-sdk-32/releases/latest/download/git-sdk-i686-minimal.tar.gz" \
            "https://github.com/git-for-windows/git-sdk-32/releases/latest/download/git-sdk-x86_minimal.tar.gz"; do
            echo "Trying $url"
            if curl -fLO "$url"; then
              tar -xzf *.tar.gz -C /c/git-sdk-32 --strip-components=1 || true
              echo "/c/git-sdk-32" > /c/git-sdk-64/usr/src/sdk32.path
              FOUND=1
              break
            fi
          done
          if [ "$FOUND" -eq 0 ]; then
            echo "/c/git-sdk-64" > /c/git-sdk-64/usr/src/sdk32.path
          fi
          echo "found32=$FOUND" > sdk32.out

      - name: "Place repos into SDK layout"
        shell: bash
        run: |
          mkdir -p /c/git-sdk-64/usr/src

          if mv "$GITHUB_WORKSPACE/build-extra" /c/git-sdk-64/usr/src/build-extra 2>/dev/null; then
            echo "Moved build-extra"
          else
            cp -a "$GITHUB_WORKSPACE/build-extra" /c/git-sdk-64/usr/src/
            rm -rf "$GITHUB_WORKSPACE/build-extra"
          fi

          if [ -d /c/git-sdk-64/usr/src/build-extra/build-extra ]; then
            mv /c/git-sdk-64/usr/src/build-extra/build-extra/* /c/git-sdk-64/usr/src/build-extra/ || true
            rmdir /c/git-sdk-64/usr/src/build-extra/build-extra || true
          fi

          if mv "$GITHUB_WORKSPACE/MSYS2-packages" /c/git-sdk-64/usr/src/MSYS2-packages 2>/dev/null; then
            echo "Moved MSYS2-packages"
          else
            cp -a "$GITHUB_WORKSPACE/MSYS2-packages" /c/git-sdk-64/usr/src/
            rm -rf "$GITHUB_WORKSPACE/MSYS2-packages"
          fi

          if mv "$GITHUB_WORKSPACE/git" /c/git-sdk-64/usr/src/git 2>/dev/null; then
            echo "Moved git"
          else
            cp -a "$GITHUB_WORKSPACE/git" /c/git-sdk-64/usr/src/
            rm -rf "$GITHUB_WORKSPACE/git"
          fi

      - name: "Detect and run build entrypoint (robust)"
        id: run-build
        shell: bash
        run: |
          set -euo pipefail
          cd /c/git-sdk-64/usr/src/build-extra

          if [ -f /c/git-sdk-64/usr/src/sdk32.path ]; then
            SDK32_PATH=$(cat /c/git-sdk-64/usr/src/sdk32.path)
          elif [ -f ../sdk32.path ]; then
            SDK32_PATH=$(cat ../sdk32.path)
          elif [ -f sdk32.path ]; then
            SDK32_PATH=$(cat sdk32.path)
          else
            SDK32_PATH=${FALLBACK_SDK32_PATH}
          fi
          echo "Using windows.sdk32.path=$SDK32_PATH"

          echo "=== SDK root ==="
          ls -la /c/git-sdk-64 || true
          echo "=== usr/src ==="
          ls -la /c/git-sdk-64/usr/src || true
          echo "=== build-extra top ==="
          ls -la . || true

          ./please.sh > please.help 2>&1 || true
          echo "=== please.sh output (first 200 lines) ==="
          sed -n '1,200p' please.help || true
          echo "=== end please.sh output ==="

          PLS_CMD=""
          if grep -qE '\brelease\b' please.help; then
            PLS_CMD=release
          elif grep -qE '\binstaller\b' please.help; then
            PLS_CMD=installer
          elif grep -qE '\bmakepkg\b' please.help; then
            PLS_CMD=makepkg
          fi

          if [ -n "$PLS_CMD" ]; then
            echo "Selected please.sh command: $PLS_CMD"
            env "windows.sdk32.path=$SDK32_PATH" ./please.sh "$PLS_CMD"
            echo "method=please" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ -x ./build-rootfs.sh ] || [ -f ./build-rootfs.sh ]; then
            echo "Found build-rootfs.sh; running legacy sequence"
            env "windows.sdk32.path=$SDK32_PATH" ./build-rootfs.sh
            env "windows.sdk32.path=$SDK32_PATH" ./build-git.sh || true
            env "windows.sdk32.path=$SDK32_PATH" ./build-installers.sh || true
            echo "method=legacy-rootfs" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ -x ./build-git.sh ] || [ -f ./build-git.sh ]; then
            echo "Found build-git.sh; running it"
            env "windows.sdk32.path=$SDK32_PATH" ./build-git.sh
            echo "method=legacy-git" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ -x ./build-installers.sh ] || [ -f ./build-installers.sh ]; then
            echo "Found build-installers.sh; running it"
            env "windows.sdk32.path=$SDK32_PATH" ./build-installers.sh
            echo "method=legacy-installers" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ -f Makefile ]; then
            echo "Found top-level Makefile; running make"
            env "windows.sdk32.path=$SDK32_PATH" make -j2
            echo "method=makefile-root" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ -d installer ] && [ -f installer/Makefile ]; then
            echo "Found installer/Makefile; running make in installer/"
            env "windows.sdk32.path=$SDK32_PATH" make -C installer -j2
            echo "method=installer-make" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ -d /c/git-sdk-64/usr/src/MSYS2-packages ]; then
            echo "MSYS2-packages present; attempting package rebuild (best-effort)"
            env "windows.sdk32.path=$SDK32_PATH" bash -lc "cd /usr/src/MSYS2-packages && echo 'PKGBUILDs:' && ls -1 | head -n 20" || true
            echo "method=msys2-packages-check" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo ""
          echo "ERROR: No build orchestration entrypoint found in build-extra."
          echo "please.sh printed the output above. Add a build script or pin build-extra to a branch with a build entrypoint."
          exit 2

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: git-for-windows-artifacts
          path: /c/git-sdk-64/usr/src/build-extra/out/artifacts/*
