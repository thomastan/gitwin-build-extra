name: PR build

on:
  push:
    branches:
      - experiment
  pull_request:
  workflow_dispatch:

env:
  GIT_CONFIG_PARAMETERS: "'checkout.workers=56'"

jobs:
  determine-packages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: determine packages to build
        id: set-matrix
        shell: bash
        run: |
          define_matrix () {
            comm -12 "$2" "$3" >"$4" &&
            cat "$4" &&
            sed -e 's/\/$//' -e 's/.*/"&", /' -e '$s/, $//' <"$4" >list.txt &&
            echo "$1=[$(test ! -s list.txt && echo '""' || tr -d '\n' <list.txt)]" >>$GITHUB_OUTPUT
          }

          show_files () {
            {
              echo "::group::$1" &&
              cat "$1" &&
              echo "::endgroup::"
            } >&2
          }

          if [ -n "${{ github.event.pull_request.base.sha }}" ]; then
            git diff ${{github.event.pull_request.base.sha}}... --name-only > raw_touched.txt
          else
            # Force build of these targets on push/manual runs
            echo "installer/" > raw_touched.txt
            echo "portable/" >> raw_touched.txt
            echo "amingit/" >> raw_touched.txt
            echo "make-file-list.sh" >> raw_touched.txt
          fi

          cat raw_touched.txt |
            sed \
              -e '/^make-file-list\.sh$/ainstaller/' \
              -e '/^make-file-list\.sh$/aportable/' \
              -e '/^make-file-list\.sh$/amingit/' \
              -e '/^make-file-list\.sh$/anuget/' \
              -e '/^7-Zip\//aportable/' \
              -e 's|^\(installer/\).*|\1|' \
              -e 's|[^/]*$||' |
            sort -u >touched.txt &&
          show_files touched.txt &&

          git ls-files \*/PKGBUILD | sed 's|[^/]*$||' | sort >directories.txt &&
          show_files directories.txt &&
          define_matrix matrix directories.txt touched.txt packages.txt &&
          show_files packages.txt &&

          if [ -z "${{ github.event.pull_request.base.sha }}" ] || \
             ! test -z "$(git log -L :create_sdk_artifact:please.sh ${{github.event.pull_request.base.sha}}.. -- )" || \
             ! test 200 -gt $(($(git diff --numstat ${{github.event.pull_request.base.sha}}.. -- please.sh | cut -f 2))) || \
             ! test -z "$(git diff ${{github.event.pull_request.base.sha}}.. -- make-file-list.sh)"; then
            echo "test-sdk-artifacts=true" >>$GITHUB_OUTPUT
          fi

          git ls-files \*/release.sh | sed 's|[^/]*$||' | sort >releaseable.txt &&
          if grep -q test-sdk-artifacts=true $GITHUB_OUTPUT
          then
            # This is already tested as part of the `sdk-artifacts` matrix
            sed -i '/^\(installer\)\/$/d' releaseable.txt
          fi &&
          show_files releaseable.txt &&
          define_matrix artifacts releaseable.txt touched.txt artifacts.txt &&
          show_files artifacts.txt ||
          exit $?

          if [ -z "${{ github.event.pull_request.base.sha }}" ] || \
             ! test -z "$(git diff ${{github.event.pull_request.base.sha}}.. -- check-for-missing-dlls.sh)"; then
            echo "check-for-missing-dlls=true" >>$GITHUB_OUTPUT
          fi
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      artifacts: ${{ steps.set-matrix.outputs.artifacts }}
      test-sdk-artifacts: ${{ steps.set-matrix.outputs.test-sdk-artifacts }}
      check-for-missing-dlls: ${{ steps.set-matrix.outputs.check-for-missing-dlls }}
  build-packages:
    needs: determine-packages
    if: needs.determine-packages.outputs.matrix != '[""]'
    strategy:
      fail-fast: false
      matrix:
        directory: ${{ fromJSON(needs.determine-packages.outputs.matrix) }}
        architecture:
          - name: x86_64
            runner: windows-latest
          - name: aarch64
            runner: windows-11-arm
    runs-on: ${{ matrix.architecture.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: git-for-windows/setup-git-for-windows-sdk@v1
        with:
          flavor: full
          architecture: ${{ matrix.architecture.name }}
      - name: build ${{ matrix.directory }}
        id: build
        shell: bash
        run: |
          top_dir=$PWD &&
          cd "${{ matrix.directory }}" &&
          MAKEFLAGS=-j8 makepkg-mingw -s --noconfirm &&
          artifacts="$(basename "${{ matrix.directory }}")-artifacts-${{ matrix.architecture.name }}" &&
          mkdir -p "$top_dir/$artifacts" &&
          mv *.tar.* "$top_dir/$artifacts"/ &&
          echo "result=$artifacts" >>$GITHUB_OUTPUT
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.build.outputs.result }}
          path: ${{ steps.build.outputs.result }}
      - name: ensure that the Git worktree is still clean
        shell: bash
        run: |
          cd "${{ matrix.directory }}" &&
          if ! git update-index --ignore-submodules --refresh ||
            ! git diff-files --ignore-submodules ||
            ! git diff-index --cached --ignore-submodules HEAD
          then
            echo "::error::Uncommitted changes after build!" >&2
            git diff
            exit 1
          fi
  build-artifacts:
    needs: determine-packages
    if: needs.determine-packages.outputs.artifacts != '[""]'
    strategy:
      fail-fast: false
      matrix:
        directory: ${{ fromJSON(needs.determine-packages.outputs.artifacts) }}
        architecture:
          - name: x86_64
            runner: windows-latest
            git-sdk: git-sdk-64
            mingw-prefix: mingw64
            msystem: MINGW64
          - name: aarch64
            runner: windows-11-arm
            git-sdk: git-sdk-arm64
            mingw-prefix: clangarm64
            msystem: CLANGARM64
        exclude:
          - directory: nuget
            architecture:
              name: aarch64
    runs-on: ${{ matrix.architecture.runner }}
    steps:
      - uses: actions/checkout@v6
      - name: initialize bare SDK clone
        shell: bash
        run: |
          git clone --bare --depth=1 --single-branch --branch=main --filter=blob:none \
            https://github.com/git-for-windows/${{ matrix.architecture.git-sdk }} .sdk
      - name: build build-installers-64 artifact
        shell: bash
        run: |
          ./please.sh create-sdk-artifact \
            --architecture=${{ matrix.architecture.name }} \
            --sdk=.sdk \
            --out=sdk-artifact \
            build-installers &&
          cygpath -aw "$PWD/sdk-artifact/usr/bin/core_perl" >>$GITHUB_PATH &&
          cygpath -aw "$PWD/sdk-artifact/usr/bin" >>$GITHUB_PATH &&
          cygpath -aw "$PWD/sdk-artifact/${{ matrix.architecture.mingw-prefix }}/bin" >>$GITHUB_PATH &&
          echo "MSYSTEM=${{ matrix.architecture.msystem }}" >>$GITHUB_ENV

      # Rename for validation
      #- name: Rename for Validation
      #  shell: cmd
      #  run: move sdk-artifact portable-git

      - name: build ${{ matrix.directory }}/
        shell: bash
        id: build
        run: |
          artifacts="$(basename "${{ matrix.directory }}")-artifacts-${{ matrix.architecture.name }}" &&
          mkdir -p "$artifacts" &&
          ./"${{ matrix.directory }}"/release.sh --output="$PWD/$artifacts/" 0-test &&
          echo "result=$artifacts" >>$GITHUB_OUTPUT
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.build.outputs.result }}
          path: ${{ steps.build.outputs.result }}
      - name: run the installer
        if: matrix.directory == 'installer'
        shell: pwsh
        run: |
          $exePath = Get-ChildItem -Path ${{ steps.build.outputs.result }}/*.exe | %{$_.FullName}
          $installer = Start-Process -PassThru -Wait -FilePath "$exePath" -ArgumentList "/SILENT /VERYSILENT /NORESTART /SUPPRESSMSGBOXES /ALLOWDOWNGRADE=1 /ALLOWINSTALLING32ON64=1 /LOG=installer.log"
          $exitCode = $installer.ExitCode
          if ($exitCode -ne 0) {
            Write-Host "::error::Installer failed with exit code $exitCode!"
            exit 1
          }
          "$env:ProgramFiles\Git\usr\bin" | Out-File -Encoding ascii -Append $env:GITHUB_PATH
          "$env:ProgramFiles\Git\${{ matrix.architecture.mingw-prefix }}\bin" | Out-File -Encoding ascii -Append $env:GITHUB_PATH
      - name: show installer log
        # run this even if the installation failed (actually, _in particular_ when the installation failed)
        if: always() && matrix.directory == 'installer'
        shell: bash
        run: cat installer.log
      - name: validate
        if: matrix.directory == 'installer'
        shell: bash
        run: |
          set -x &&
          grep 'Installation process succeeded' installer.log &&
          ! grep -iw failed installer.log &&
          cygpath -aw / &&
          git.exe version --build-options >version &&
          cat version &&
          checklist=installer/run-checklist.sh &&
          # cannot test SSH keys in read-only mode, skip test for now
          sed -i 's|git@ssh.dev.azure.com:v3/git-for-windows/git/git|https://github.com/git/git|' $checklist &&
          sh -x $checklist
      - name: extract Portable Git
        if: matrix.directory == 'portable'
        shell: pwsh
        run: |
          $exePath = Get-ChildItem -Path ${{ steps.build.outputs.result }}/*.7z.exe | %{$_.FullName}
          Get-ChildItem -Path "$exePath"
          $installer = Start-Process -PassThru -Wait -FilePath "$exePath" -ArgumentList "-o portable-git -y"
          $exitCode = $installer.ExitCode
          if ($exitCode -ne 0) {
            Write-Host "::error::Extracting the Portable Git failed with exit code $exitCode!"
            exit 1
          }
          Get-ChildItem -Path "portable-git"
          "$PWD\portable-git\usr\bin" | Out-File -Encoding ascii -Append $env:GITHUB_PATH
          "$PWD\portable-git\${{ matrix.architecture.mingw-prefix }}\bin" | Out-File -Encoding ascii -Append $env:GITHUB_PATH
      - name: validate
        if: matrix.directory == 'portable'
        shell: bash
        run: |
          set -x &&
          root="$(cygpath -aw /)" &&
          # change made here
          test "${root%sdk-artifact}" != "$root" &&
          git.exe version --build-options >version &&
          cat version
  sdk-artifacts:
    needs: determine-packages
    if: needs.determine-packages.outputs.test-sdk-artifacts == 'true'
    strategy:
      fail-fast: false
      matrix:
        artifact: ['minimal', 'makepkg-git', 'build-installers', 'full']
        arch:
          - name: i686
            mingw-prefix: mingw32
            msystem: MINGW32
            sdk-repo: git-sdk-32
            runner: windows-latest
          - name: x86_64
            mingw-prefix: mingw64
            msystem: MINGW64
            sdk-repo: git-sdk-64
            runner: windows-latest
          - name: aarch64
            mingw-prefix: clangarm64
            msystem: CLANGARM64
            sdk-repo: git-sdk-arm64
            runner: windows-11-arm
        exclude:
          - artifact: minimal
            arch:
              name: i686
              mingw-prefix: mingw32
              msystem: MINGW32
              sdk-repo: git-sdk-32
          - artifact: makepkg-git
            arch:
              name: i686
              mingw-prefix: mingw32
              msystem: MINGW32
              sdk-repo: git-sdk-32
    runs-on: ${{ matrix.arch.runner }}
    steps:
      - uses: actions/checkout@v6

      # Use full SDK, not just the build-installers flavor
      - name: initialize bare SDK clone
        shell: bash
        run: |
          # If we are building installers, we need the FULL toolchain to compile Bash
          if [ "${{ matrix.artifact }}" = "build-installers" ] || [ "${{ matrix.artifact }}" = "full" ]; then
            partial=""
          else
            partial="--filter=blob:none"
          fi

          git clone --bare --depth=1 --single-branch --branch=main $partial \
            https://github.com/git-for-windows/${{ matrix.arch.sdk-repo }} .sdk

      - name: build ${{ matrix.artifact }} artifact
        id: build-artifact
        shell: bash
        run: |
          set -x &&
          case "${{ matrix.artifact }}" in
          full)
            git --git-dir=.sdk worktree add --detach sdk-artifact
            ;;
          *)
            ./please.sh create-sdk-artifact \
              --architecture=${{ matrix.arch.name }} \
              --sdk=.sdk \
              --out=sdk-artifact \
              ${{ matrix.artifact }}
            ;;
          esac &&
          ls -la sdk-artifact/ &&
          version="$(sdk-artifact/${{ matrix.arch.mingw-prefix }}/bin/git.exe version)" &&
          echo "git-version=$version" >>$GITHUB_OUTPUT &&
          cygpath -aw "$PWD/sdk-artifact/usr/bin/core_perl" >>$GITHUB_PATH &&
          cygpath -aw "$PWD/sdk-artifact/usr/bin" >>$GITHUB_PATH &&
          cygpath -aw "$PWD/sdk-artifact/${{ matrix.arch.mingw-prefix }}/bin" >>$GITHUB_PATH &&
          echo "MSYSTEM=${{ matrix.arch.msystem }}" >>$GITHUB_ENV &&
          cat $GITHUB_PATH

      # this is to pass some check later on
      #- name: Prepare Folder for Validation
      #  shell: cmd
      #  run: move sdk-artifact portable-git

      # Intentionally, this custom bash will be built with --no-check. Our own checks will follow
      - name: Build and Inject Xdg-Patched Bash
        if: matrix.artifact == 'build-installers'
        shell: bash
        run: |
          # # 1. THE PROBE: Log exactly what the network sees
          echo "DEBUG: Proving network connectivity to the mirror..."
          curl -Iv --retry 3 "https://mirror.csclub.uwaterloo.ca/gnu/bash/bash-5.3.tar.gz" || echo "PROBE FAILED"
          #export MAKEPKG_DOWNLOADER='curl -v -fSL --retry 5 --retry-delay 3'

          # Set location where output goes, which is a 'SDK' location
          SDK_DIR="$(pwd)/sdk-artifact"

          # bring back the local database folder (since please.sh wiped it)
          mkdir -p "$SDK_DIR/var/lib/pacman/local"

          "$SDK_DIR/usr/bin/pacman" -Sy --noconfirm
          "$SDK_DIR/usr/bin/pacman" -S --noconfirm libreadline-devel ncurses-devel curl patch

          mkdir -p "$SDK_DIR/usr/src/bash"

          git clone --depth 1 -b xdg-patched https://github.com/thomastan/msys2-packages.git /tmp/patched-bash
          cp -rf /tmp/patched-bash/bash/. "$SDK_DIR/usr/src/bash/"

          cd "$SDK_DIR/usr/src/bash"

          ## For some reason, ghwf can fail to download from https://ftp.gnu.org, so download from https://mirrors.kernel.org
          ## extract the bash version number we would need to use in the URL
          #BASH_VER=$(grep "^_basever=" PKGBUILD | cut -d= -f2)

          ## Bypass GNU ftp blocks by getting bash from kernel.org mirrors (gzipped tarballs are still signed)
          #curl -fSL --retry 5 -O "https://mirrors.kernel.org/gnu/bash/bash-$BASH_VER.tar.gz"
          #curl -fSL --retry 5 -o "bash-$BASH_VER.tar.gz.sig" "https://ftp.gnu.org/gnu/bash/bash-$BASH_VER.tar.gz.sig"

          #sed -i 's|https://ftp.gnu.org/gnu/bash/|https://mirrors.kernel.org/gnu/bash/|g' PKGBUILD
          sed -i 's|https://ftp.gnu.org/gnu/bash/|https://mirror.csclub.uwaterloo.ca/gnu/bash/|g' PKGBUILD

          curl -fSL -o chets-key.asc "https://tiswww.case.edu/php/chet/gpgkey.asc"
          "$SDK_DIR/usr/bin/gpg" --import chets-key.asc

          export DLAGENTS=("https::${SDK_DIR}/usr/bin/curl.exe -k -gqb \"\" -fLC - --retry 3 --retry-delay 3 -o %o %u"
                           "http::${SDK_DIR}/usr/bin/curl.exe -k -gqb \"\" -fLC - --retry 3 --retry-delay 3 -o %o %u")
          "$SDK_DIR/usr/bin/bash" --noprofile --norc -c "makepkg -si --noconfirm --nocheck"

      - name: Deep Verify Bash Patch
        if: matrix.artifact == 'build-installers'
        shell: bash
        env:
          MSYSTEM: ${{ matrix.arch.msystem }}
        run: |
          TARGET_BASH="$(pwd)/sdk-artifact/usr/bin/bash.exe"
          echo Deep Testing: $(sha256sum "$TARGET_BASH")

          export XDG_CONFIG_HOME="$(pwd)/tmp_xdg_config"
          export XDG_STATE_HOME="$(pwd)/tmp_xdg_state"
          mkdir -p "$XDG_CONFIG_HOME/bash" "$XDG_STATE_HOME/bash"
          touch "$XDG_CONFIG_HOME/bash/bashrc" "$XDG_STATE_HOME/bash/bash_history"

          "$TARGET_BASH" -i -c 'echo "HIST:$HISTFILE"; echo "RC:$BASHRC"' < /dev/null > output.txt 2>&1
          cat output.txt

          grep -q "$XDG_STATE_HOME/bash/bash_history" output.txt || { echo "FAIL: XDG_STATE_HOME ignored"; exit 1; }
          grep -q "$XDG_CONFIG_HOME/bash/bashrc" output.txt || { echo "FAIL: XDG_CONFIG_HOME ignored"; exit 1; }

          rm -rf "$XDG_STATE_HOME" "$XDG_CONFIG_HOME"
          unset XDG_STATE_HOME XDG_CONFIG_HOME
          
          DEFAULT_HISTFILE=$(env -u HISTFILE "$TARGET_BASH" -i -c 'echo $HISTFILE' < /dev/null 2>/dev/null)
          
          if [[ "$DEFAULT_HISTFILE" != "$HOME/.bash_history" ]]; then
            echo "Error: Expected $HOME/.bash_history but got $DEFAULT_HISTFILE"
            exit 1
          fi
          
          echo "Deep Verification of Xdg-patched bash Successful for ${{ matrix.arch.name }}!"
        # Done: xdg-bash installed in SDK path, now build installers

      - name: build installer
        if: matrix.artifact == 'build-installers'
        shell: bash
        run: ./installer/release.sh --include-self-check --output=$PWD/installer-${{ matrix.arch.name }} 0-test
      - uses: actions/upload-artifact@v7
        if: matrix.artifact == 'build-installers'
        with:
          name: installer-${{ matrix.arch.name }}
          path: installer-${{ matrix.arch.name }}
      - name: run the installer
        if: matrix.artifact == 'build-installers'
        shell: pwsh
        run: |
          $exePath = Get-ChildItem -Path installer-${{ matrix.arch.name }}/*.exe | %{$_.FullName}
          $installer = Start-Process -PassThru -Wait -FilePath "$exePath" -ArgumentList "/SILENT /VERYSILENT /NORESTART /SUPPRESSMSGBOXES /ALLOWDOWNGRADE=1 /ALLOWINSTALLING32ON64=1 /LOG=installer.log"
          $exitCode = $installer.ExitCode
          if ($exitCode -ne 0) {
            Write-Host "::error::Installer failed with exit code $exitCode!"
            exit 1
          }
          if ("${{ matrix.arch.name }}" -eq "i686") {
            "${env:ProgramFiles(x86)}\Git\usr\bin" | Out-File -Encoding ascii -Append $env:GITHUB_PATH
            "${env:ProgramFiles(x86)}\Git\${{ matrix.arch.mingw-prefix }}\bin" | Out-File -Encoding ascii -Append $env:GITHUB_PATH
          } else {
            "$env:ProgramFiles\Git\usr\bin" | Out-File -Encoding ascii -Append $env:GITHUB_PATH
            "$env:ProgramFiles\Git\${{ matrix.arch.mingw-prefix }}\bin" | Out-File -Encoding ascii -Append $env:GITHUB_PATH
          }
      - name: show installer log
        # run this even if the installation failed (actually, _in particular_ when the installation failed)
        if: always() && matrix.artifact == 'build-installers'
        shell: bash
        run: cat installer.log
      - name: validate
        if: matrix.artifact == 'build-installers'
        shell: bash
        run: |
          set -x &&
          grep 'Installation process succeeded' installer.log &&
          ! grep -iw failed installer.log &&
          cygpath -aw / &&
          git.exe version --build-options >version &&
          cat version &&
          grep "${{ steps.build-artifact.outputs.git-version }}" version &&
          checklist=installer/run-checklist.sh &&
          # cannot test SSH keys in read-only mode, skip test for now
          sed -i 's|git@ssh.dev.azure.com:v3/git-for-windows/git/git|https://github.com/git/git|' $checklist &&
          sh -x $checklist &&
          git update-git-for-windows --test-version-compare
  check-for-missing-dlls:
    needs: determine-packages
    if: needs.determine-packages.outputs.test-sdk-artifacts == 'true' || needs.determine-packages.outputs.check-for-missing-dlls == 'true'
    strategy:
      fail-fast: false
      matrix:
        arch:
          - name: i686
            mingw-prefix: mingw32
            msystem: MINGW32
            sdk-repo: git-sdk-32
            runner: windows-latest
          - name: x86_64
            mingw-prefix: mingw64
            msystem: MINGW64
            sdk-repo: git-sdk-64
            runner: windows-latest
          - name: aarch64
            mingw-prefix: clangarm64
            msystem: CLANGARM64
            sdk-repo: git-sdk-arm64
            runner: windows-11-arm
    runs-on: ${{ matrix.arch.runner }}
    steps:
      - uses: actions/checkout@v6
      - name: initialize bare SDK clone
        shell: bash
        run: |
          git clone --bare --depth=1 --single-branch --branch=main --filter=blob:none \
            https://github.com/git-for-windows/${{ matrix.arch.sdk-repo }} .sdk
      - name: build build-installers-${{ matrix.arch.name }} artifact
        shell: bash
        run: |
          set -x &&
          INCLUDE_OBJDUMP=t \
          ./please.sh create-sdk-artifact \
            --architecture=${{ matrix.arch.name }} \
            --sdk=.sdk \
            --out=sdk-artifact \
            build-installers &&
          cygpath -aw "$PWD/sdk-artifact/usr/bin/core_perl" >>$GITHUB_PATH &&
          cygpath -aw "$PWD/sdk-artifact/usr/bin" >>$GITHUB_PATH &&
          cygpath -aw "$PWD/sdk-artifact/${{ matrix.arch.mingw-prefix }}/bin" >>$GITHUB_PATH &&
          echo "MSYSTEM=${{ matrix.arch.msystem }}" >>$GITHUB_ENV &&
          cat $GITHUB_PATH
      - name: check for missing DLLs
        shell: bash
        run: sh -x ./check-for-missing-dlls.sh
      - name: check for missing DLLs (MinGit)
        shell: bash
        run: MINIMAL_GIT=1 ./check-for-missing-dlls.sh
